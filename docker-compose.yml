services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mailmind-postgres
    environment:
      POSTGRES_USER: mailmind
      POSTGRES_PASSWORD: mailmind
      POSTGRES_DB: mailmind
    ports:
      # 5433 on host — 5432 is taken by local/work Postgres
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailmind -d mailmind"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mailmind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
